<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeAuto - Envio de E-mail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
    <body>
        <nav class="navbar-homeauto mb-4">
            <div class="container d-flex justify-content-between align-items-center">
                <a href="index.html" class="brand-name">🏠 HomeAuto</a>
                <div class="nav-actions">
                    <a href="index.html" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-house-door"></i> Menu Principal
                    </a>
                </div>
            </div>
        </nav>

        <main class="container">
            <div class="service-container">
                <div class="custom-card shadow-sm">
                    <h2 class="h4 mb-4"><i class="bi bi-envelope-at me-2"></i>Enviar documentos</h2>
                    <div id="alertContainer">

                    </div>
                    <form id="uploadForm">
                        <div class="mb-3">
                            <label class="form-label font-weight-bold">Selecione os 2 PDFs:</label>
                            <input type="file" id="pdfFiles" class="form-control" accept=".pdf" multiple required>
                        </div>
                        <button type="submit" id="btnSend" class="btn btn-primary w-100 py-2">
                            <i class="bi bi-send-fill"></i> Enviar E-mail Agora
                        </button>
                    </form>
                </div>
            </div>
        </main>


        <footer class="footer-homeauto">
            <div class="container text-center">
                <p class="mb-0">© 2026 <strong>HomeAuto</strong> - Cristhiano Mello</p>
                <small>Automação Pessoal e Inteligente</small>
            </div>
        </footer>


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/main.js"></script>
    </body>
</html>
